<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的第一个AI工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 50%, #9333ea 100%);
      color: #ffffff;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 35%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 48px 32px;
      width: min(92vw, 520px);
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 24px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    h1 {
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 12px;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
    }

    .subtitle {
      font-size: 1rem;
      opacity: 0.9;
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      padding: 16px 40px;
      font-size: 1.125rem;
      font-weight: 600;
      color: #4c1d95;
      background: #ffffff;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
      background: #f8fafc;
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.22);
    }

    .message {
      margin-top: 28px;
      font-size: 1.125rem;
      line-height: 1.7;
      min-height: 1.7em;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .message.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>我的第一个AI工具</h1>
    <p class="subtitle">欢迎来到你的第一个 AI 小工具页面</p>
    <button class="btn" id="tryBtn" type="button">点我试试</button>
    <p class="message" id="message" aria-live="polite"></p>
  </main>

  <script>
    const tryBtn = document.getElementById("tryBtn");
    const message = document.getElementById("message");

    tryBtn.addEventListener("click", function () {
      message.textContent = "你好！这是我的第一个AI工具！";
      message.classList.add("show");
    });
  </script>
</body>
</html>
